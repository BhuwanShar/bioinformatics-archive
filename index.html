<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioinformatics Knowledge Archive</title>
    <style>
        /* ============================================
           CSS RESET & BASE
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #bc8cff;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --accent-pink: #f778ba;
            --accent-cyan: #39d2c0;
            --node-genomics: #58a6ff;
            --node-transcriptomics: #3fb950;
            --node-proteomics: #bc8cff;
            --node-phylogenetics: #d29922;
            --node-metagenomics: #f778ba;
            --node-structural: #39d2c0;
            --node-comparative: #f85149;
            --node-functional: #ff7b72;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 48px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #1a1e2e 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 800px;
            margin: 0 auto 1rem;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .search-container input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .search-container .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ============================================
           NAVIGATION BREADCRUMB
           ============================================ */
        .breadcrumb {
            padding: 0.75rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            color: var(--accent-blue);
            cursor: pointer;
            transition: var(--transition);
        }

        .breadcrumb-item:hover {
            text-decoration: underline;
        }

        .breadcrumb-separator {
            color: var(--text-muted);
        }

        .breadcrumb-current {
            color: var(--text-secondary);
        }

        /* ============================================
           MAIN LAYOUT
           ============================================ */
        .main-container {
            display: flex;
            min-height: calc(100vh - 140px);
        }

        /* ============================================
           SIDEBAR - TREE NAVIGATION
           ============================================ */
        .sidebar {
            width: 380px;
            min-width: 380px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 1rem 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .tree-section-title {
            padding: 0.5rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Tree Node Styles */
        .tree-node {
            user-select: none;
        }

        .tree-node-header {
            display: flex;
            align-items: center;
            padding: 8px 16px 8px calc(16px + var(--depth, 0) * 20px);
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            gap: 8px;
            font-size: 0.9rem;
        }

        .tree-node-header:hover {
            background: var(--bg-tertiary);
        }

        .tree-node-header.active {
            background: rgba(88, 166, 255, 0.1);
            border-left-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .tree-node-header.active .node-icon {
            color: var(--accent-blue);
        }

        .tree-toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .tree-toggle.expanded {
            transform: rotate(90deg);
        }

        .tree-toggle.leaf {
            visibility: hidden;
        }

        .node-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .node-label {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-badge {
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .tree-node-children {
            display: none;
        }

        .tree-node-children.expanded {
            display: block;
        }

        /* Color coding for different fields */
        .tree-node-header[data-color="blue"] .node-icon { color: var(--node-genomics); }
        .tree-node-header[data-color="green"] .node-icon { color: var(--node-transcriptomics); }
        .tree-node-header[data-color="purple"] .node-icon { color: var(--node-proteomics); }
        .tree-node-header[data-color="orange"] .node-icon { color: var(--node-phylogenetics); }
        .tree-node-header[data-color="pink"] .node-icon { color: var(--node-metagenomics); }
        .tree-node-header[data-color="cyan"] .node-icon { color: var(--node-structural); }
        .tree-node-header[data-color="red"] .node-icon { color: var(--node-comparative); }

        /* ============================================
           CONTENT PANEL
           ============================================ */
        .content-panel {
            flex-grow: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
            max-width: calc(100% - 380px);
        }

        .content-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .content-card:hover {
            border-color: rgba(88, 166, 255, 0.3);
        }

        .content-card h2 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .content-card h3 {
            font-size: 1.15rem;
            margin: 1.5rem 0 0.75rem;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .content-card h4 {
            font-size: 1rem;
            margin: 1.25rem 0 0.5rem;
            color: var(--accent-purple);
        }

        .content-card p {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            line-height: 1.8;
        }

        .content-card ul, .content-card ol {
            color: var(--text-secondary);
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .content-card li {
            margin-bottom: 0.4rem;
            line-height: 1.7;
        }

        .content-card li strong {
            color: var(--text-primary);
        }

        /* Tag pills */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            border: 1px solid;
        }

        .tag-tool { background: rgba(88, 166, 255, 0.1); color: var(--accent-blue); border-color: rgba(88, 166, 255, 0.3); }
        .tag-algo { background: rgba(188, 140, 255, 0.1); color: var(--accent-purple); border-color: rgba(188, 140, 255, 0.3); }
        .tag-db { background: rgba(63, 185, 80, 0.1); color: var(--accent-green); border-color: rgba(63, 185, 80, 0.3); }
        .tag-format { background: rgba(210, 153, 34, 0.1); color: var(--accent-orange); border-color: rgba(210, 153, 34, 0.3); }
        .tag-question { background: rgba(248, 81, 73, 0.1); color: var(--accent-red); border-color: rgba(248, 81, 73, 0.3); }
        .tag-lang { background: rgba(247, 120, 186, 0.1); color: var(--accent-pink); border-color: rgba(247, 120, 186, 0.3); }

        /* Info boxes */
        .info-box {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-sm);
            margin: 1rem 0;
            border-left: 4px solid;
        }

        .info-box.definition {
            background: rgba(88, 166, 255, 0.05);
            border-color: var(--accent-blue);
        }

        .info-box.question {
            background: rgba(63, 185, 80, 0.05);
            border-color: var(--accent-green);
        }

        .info-box.warning {
            background: rgba(210, 153, 34, 0.05);
            border-color: var(--accent-orange);
        }

        .info-box.math {
            background: rgba(188, 140, 255, 0.05);
            border-color: var(--accent-purple);
        }

        .info-box .info-title {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .info-box.definition .info-title { color: var(--accent-blue); }
        .info-box.question .info-title { color: var(--accent-green); }
        .info-box.warning .info-title { color: var(--accent-orange); }
        .info-box.math .info-title { color: var(--accent-purple); }

        /* Code blocks */
        .code-block {
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            margin: 1rem 0;
            overflow-x: auto;
            position: relative;
        }

        .code-block pre {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .code-block .code-lang {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .code-block .copy-btn {
            position: absolute;
            top: 8px;
            right: 60px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: var(--transition);
        }

        .code-block .copy-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        /* Pipeline flow diagram */
        .pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            margin: 1.5rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pipeline-step {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            text-align: center;
            min-width: 120px;
            transition: var(--transition);
        }

        .pipeline-step:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .pipeline-step .step-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .pipeline-step .step-tool {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-top: 4px;
        }

        .pipeline-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
            padding: 0 4px;
        }

        /* Comparison tables */
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.88rem;
        }

        .comparison-table th {
            background: var(--bg-tertiary);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            color: var(--accent-blue);
        }

        .comparison-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .comparison-table tr:hover td {
            background: rgba(88, 166, 255, 0.03);
        }

        /* Math / Formula display */
        .formula {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            text-align: center;
            padding: 1rem;
            font-size: 1.1rem;
            color: var(--accent-purple);
        }

        /* Interpretation guide boxes */
        .interpretation {
            background: rgba(57, 210, 192, 0.05);
            border: 1px solid rgba(57, 210, 192, 0.2);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            margin: 1rem 0;
        }

        .interpretation h4 {
            color: var(--accent-cyan) !important;
            margin-top: 0 !important;
        }

        /* Landing page grid */
        .landing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
            margin: 1.5rem 0;
        }

        .landing-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .landing-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .landing-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .landing-card .card-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .landing-card .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .landing-card .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .landing-card .card-count {
            margin-top: 0.75rem;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* Color-specific cards */
        .landing-card.genomics::before { background: var(--node-genomics); }
        .landing-card.transcriptomics::before { background: var(--node-transcriptomics); }
        .landing-card.proteomics::before { background: var(--node-proteomics); }
        .landing-card.phylogenetics::before { background: var(--node-phylogenetics); }
        .landing-card.metagenomics::before { background: var(--node-metagenomics); }
        .landing-card.structural::before { background: var(--node-structural); }
        .landing-card.comparative::before { background: var(--node-comparative); }
        .landing-card.functional::before { background: var(--node-functional); }

        /* Decision tree visual */
        .decision-flow {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
        }

        .decision-node {
            display: inline-block;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            margin: 0.5rem;
            font-size: 0.88rem;
            font-weight: 500;
        }

        .decision-node.question-node {
            background: rgba(210, 153, 34, 0.15);
            border: 1px solid rgba(210, 153, 34, 0.4);
            color: var(--accent-orange);
        }

        .decision-node.answer-node {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            color: var(--accent-blue);
            cursor: pointer;
        }

        .decision-node.answer-node:hover {
            background: rgba(88, 166, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .content-panel {
                max-width: 100%;
                padding: 1.5rem;
            }
            .landing-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar for content */
        .content-panel::-webkit-scrollbar {
            width: 8px;
        }

        .content-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-panel::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /* Utility classes */
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .text-muted { color: var(--text-muted); }
        .text-blue { color: var(--accent-blue); }
        .text-green { color: var(--accent-green); }
        .text-purple { color: var(--accent-purple); }
        .text-orange { color: var(--accent-orange); }
        .text-bold { font-weight: 600; }

        /* Highlight for search */
        .highlight {
            background: rgba(210, 153, 34, 0.3);
            border-radius: 2px;
            padding: 0 2px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- ============================================
     HEADER
     ============================================ -->
<div class="header">
    <h1>🧬 Bioinformatics Knowledge Archive</h1>
    <p>A comprehensive, interactive decision tree for bioinformatics analysis — from raw data to biological insight. Click any node to explore tools, algorithms, workflows, and interpretation guides.</p>
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search tools, methods, concepts... (e.g., DESeq2, phylogeny, 16S)" autocomplete="off">
    </div>
</div>

<!-- ============================================
     BREADCRUMB
     ============================================ -->
<div class="breadcrumb" id="breadcrumb">
    <span class="breadcrumb-current">🏠 Home</span>
</div>

<!-- ============================================
     MAIN LAYOUT
     ============================================ -->
<div class="main-container">

    <!-- SIDEBAR TREE -->
    <div class="sidebar" id="sidebar">
        <div class="tree-section-title">Knowledge Tree</div>
        <div id="treeContainer"></div>
    </div>

    <!-- CONTENT PANEL -->
    <div class="content-panel" id="contentPanel">
        <!-- Content will be dynamically inserted here -->
    </div>

</div>

<script>
// ============================================================
// COMPLETE BIOINFORMATICS KNOWLEDGE DATA
// ============================================================

const KNOWLEDGE_BASE = {
    id: "root",
    label: "Bioinformatics",
    icon: "🧬",
    color: "blue",
    content: {
        title: "🧬 Bioinformatics — The Complete Archive",
        type: "landing",
        sections: [
            {
                type: "definition",

            {
                type: "paragraph",
                text: "Select a domain from the tree on the left or click a card below to explore the full landscape of bioinformatics — including the biological questions each field answers, the tools and algorithms used, mathematical foundations, data formats, and step-by-step reproducible workflows."
            }
        ]
    },
    children: [
        // ====================================================
        // 1. GENOMICS
        // ====================================================
        {
            id: "genomics",
            label: "Genomics",
            icon: "🧬",
            color: "blue",
            content: {
                title: "🧬 Genomics",
                sections: [
                    {
                        type: "definition",
                        title: "What is Genomics?",
                        text: "Genomics is the study of the complete set of DNA (the genome) of an organism. It encompasses the sequencing, assembly, annotation, and analysis of genomes to understand gene structure, function, evolution, and regulation."
                    },
                    {
                        type: "questions",
                        title: "Biological Questions Answered",
                        items: [
                            "What genes does an organism have and where are they located?",
                            "How does the genome vary between individuals (SNPs, indels, CNVs, SVs)?",
                            "What are the regulatory elements controlling gene expression?",
                            "How do genomes evolve over time?",
                            "What genetic variants are associated with diseases or traits?",
                            "What is the ploidy and genome size of an organism?",
                            "How are genomes organized (synteny, repeats, transposable elements)?"
                        ]
                    },
                    {
                        type: "tags",
                        items: [
                            { label: "BWA", class: "tag-tool" },
                            { label: "Bowtie2", class: "tag-tool" },
                            { label: "GATK", class: "tag-tool" },
                            { label: "bcftools", class: "tag-tool" },
                            { label: "SPAdes", class: "tag-tool" },
                            { label: "MEGAHIT", class: "tag-tool" },
                            { label: "Prokka", class: "tag-tool" },
                            { label: "BLAST", class: "tag-tool" },
                            { label: "Smith-Waterman", class: "tag-algo" },
                            { label: "Needleman-Wunsch", class: "tag-algo" },

# RNA-seq ALIGNMENT PIPELINE
# ============================================
conda create -n rnaseq_env -c bioconda hisat2 samtools subread -y
conda activate rnaseq_env

mkdir -p rnaseq_project/{reference,trimmed,aligned,counts}

# ============================================

# For practice, use a smaller genome like yeast or Drosophila

wget -P reference/ https://ftp.ensembl.org/pub/release-110/gtf/saccharomyces_cerevisiae/Saccharomyces_cerevisiae.R64-1-1.110.gtf.gz
gunzip reference/*.gz

# ============================================
# STEP 2: Build HISAT2 index
# ============================================
# Extract splice sites and exons from GTF (improves alignment)
hisat2_extract_splice_sites.py reference/*.gtf > reference/splice_sites.txt
hisat2_extract_exons.py reference/*.gtf > reference/exons.txt

# Build index with splice site information
hisat2-build \\
    --ss reference/splice_sites.txt \\
    --exon reference/exons.txt \\
    reference/*.fa \\
    reference/genome_index \\
    -p 8

# ============================================
# STEP 3: Align each sample
# ============================================
# Loop through all samples
for sample in control_rep1 control_rep2 control_rep3 treat_rep1 treat_rep2 treat_rep3; do
    echo "Aligning $sample..."
    
    hisat2 \\
        -x reference/genome_index \\
        -1 trimmed/\${sample}_1.fastq \\
        -2 trimmed/\${sample}_2.fastq \\
        --rna-strandness RF \\
        --dta \\
        --summary-file aligned/\${sample}_summary.txt \\
        -p 8 \\
        | samtools sort -@ 4 -o aligned/\${sample}_sorted.bam -
    
    samtools index aligned/\${sample}_sorted.bam
    
    echo "$sample alignment complete"
done

# --dta = downstream transcriptome assembly (for StringTie)

    -t exon \\
    -g gene_id \\

# ============================================
# STEP 1: Load libraries
# ============================================
library(DESeq2)
library(ggplot2)
library(pheatmap)
library(EnhancedVolcano)
library(RColorBrewer)

# ============================================
# STEP 2: Import count data
# ============================================
# Option A: From featureCounts output
count_data <- read.table("counts/gene_counts_clean.txt",
                         header = TRUE, row.names = 1)

# Clean column names (remove file path if present)
colnames(count_data) <- gsub("aligned.|_sorted.bam", "",
                              colnames(count_data))

# Option B: From a count matrix CSV
# count_data <- read.csv("counts/count_matrix.csv", row.names = 1)

# Create sample information table
col_data <- data.frame(
    condition = factor(c(rep("control", 3), rep("treated", 3)),
                      levels = c("control", "treated")),
    replicate = factor(rep(1:3, 2)),
    row.names = colnames(count_data)
)

# Verify column order matches
stopifnot(all(rownames(col_data) == colnames(count_data)))

cat("Count matrix dimensions:", dim(count_data), "\\n")
cat("Samples:", colnames(count_data), "\\n")

# ============================================
# STEP 3: Create DESeq2 dataset
# ============================================
dds <- DESeqDataSetFromMatrix(
    countData = count_data,
    colData = col_data,
    design = ~ condition  # formula: what to test
)

# Pre-filtering: remove genes with very low counts
# Keep genes with at least 10 reads total across all samples
keep <- rowSums(counts(dds)) >= 10
dds <- dds[keep, ]
cat("Genes after filtering:", nrow(dds), "\\n")

# ============================================
# STEP 4: Run DESeq2
# ============================================
dds <- DESeq(dds)

# This performs:
# 1. Estimation of size factors (normalization)
# 2. Estimation of dispersion
# 3. Negative Binomial GLM fitting + Wald test

# ============================================
# STEP 5: Extract results
# ============================================
res <- results(dds,
               contrast = c("condition", "treated", "control"),
               alpha = 0.05)  # FDR threshold

# Shrink log2FC for visualization (reduces noise for low-count genes)

                         type = "apeglm")

          file = "results/deseq2_all_results.csv")

cat("Significant DEGs (|log2FC| > 1, padj < 0.05):", nrow(sig_genes), "\\n")

percent_var <- round(100 * attr(pca_data, "percentVar"))

ggplot(pca_data, aes(PC1, PC2, color = condition, shape = condition)) +
    geom_point(size = 4) +
    xlab(paste0("PC1: ", percent_var[1], "% variance")) +
    ylab(paste0("PC2: ", percent_var[2], "% variance")) +
    theme_minimal(base_size = 14) +
    scale_color_brewer(palette = "Set1") +
    ggtitle("PCA: Sample Clustering") +
    theme(plot.title = element_text(hjust = 0.5))
ggsave("results/PCA_plot.pdf", width = 8, height = 6)

# --- Dispersion Plot ---
pdf("results/dispersion_plot.pdf")
plotDispEsts(dds, main = "Dispersion Estimates")
dev.off()

# --- MA Plot ---
pdf("results/MA_plot.pdf", width = 8, height = 6)
plotMA(res_shrunk, ylim = c(-5, 5), main = "MA Plot (shrunk LFC)")
dev.off()

# ============================================

    title = 'Treated vs Control',
    pCutoff = 0.05,

    legendPosition = 'right')
ggsave("results/volcano_plot.pdf", width = 10, height = 8)

# ============================================
# STEP 8: Heatmap of Top DEGs
# ============================================
# Get top 50 DEGs by padj
top_genes <- head(rownames(res_ordered[!is.na(res_ordered$padj), ]), 50)

# Get normalized counts

         width = 10, height = 12)

cat("\\n✅ DESeq2 Analysis Complete!\\n")

# Filter low-expression genes
keep <- filterByExpr(dge)
dge <- dge[keep, , keep.lib.sizes = FALSE]

colnames(design) <- levels(col_data$condition)

contrast_matrix <- makeContrasts(

    levels = design
)

fit2 <- contrasts.fit(fit, contrast_matrix)
fit2 <- eBayes(fit2)

# Get results

                          coef = "treated_vs_control",
                          number = Inf,
                          sort.by = "P")

# Summary
summary(decideTests(fit2, p.value = 0.05, lfc = 1))

write.csv(limma_results, "results/limma_voom_results.csv")`

# ============================================

# ============================================

# ============================================

echo "✅ QIIME2 Analysis Complete!"
echo "View .qzv files at https://view.qiime2.org/"`

// ============================================================
// RENDERING ENGINE
// ============================================================

class BioinformaticsApp {
    constructor() {
        this.treeContainer = document.getElementById('treeContainer');
        this.contentPanel = document.getElementById('contentPanel');
        this.breadcrumb = document.getElementById('breadcrumb');
        this.searchInput = document.getElementById('searchInput');
        this.activeNodeId = null;
        this.expandedNodes = new Set(['root']);
        this.nodeMap = new Map();

        this.buildNodeMap(KNOWLEDGE_BASE);
        this.renderTree();
        this.showContent('root');
        this.setupSearch();
    }

    buildNodeMap(node, path = []) {
        const currentPath = [...path, { id: node.id, label: node.label }];
        this.nodeMap.set(node.id, { ...node, path: currentPath });
        if (node.children) {
            node.children.forEach(child => this.buildNodeMap(child, currentPath));
        }
    }

    renderTree() {
        this.treeContainer.innerHTML = '';
        this.treeContainer.appendChild(this.createTreeNode(KNOWLEDGE_BASE, 0));
    }

    createTreeNode(node, depth) {
        const container = document.createElement('div');
        container.className = 'tree-node';
        container.dataset.id = node.id;

        const header = document.createElement('div');
        header.className = 'tree-node-header';
        if (node.color) header.dataset.color = node.color;
        header.style.setProperty('--depth', depth);

        const hasChildren = node.children && node.children.length > 0;
        const isExpanded = this.expandedNodes.has(node.id);

        const toggle = document.createElement('span');
        toggle.className = `tree-toggle ${hasChildren ? (isExpanded ? 'expanded' : '') : 'leaf'}`;
        toggle.textContent = '▶';

        const icon = document.createElement('span');
        icon.className = 'node-icon';
        icon.textContent = node.icon || '📄';

        const label = document.createElement('span');
        label.className = 'node-label';
        label.textContent = node.label;

        if (hasChildren) {
            const badge = document.createElement('span');
            badge.className = 'node-badge';
            badge.textContent = this.countAllChildren(node);
            header.appendChild(toggle);
            header.appendChild(icon);
            header.appendChild(label);
            header.appendChild(badge);
        } else {
            header.appendChild(toggle);
            header.appendChild(icon);
            header.appendChild(label);
        }

        header.addEventListener('click', (e) => {
            e.stopPropagation();
            if (hasChildren) {
                if (this.expandedNodes.has(node.id)) {
                    this.expandedNodes.delete(node.id);
                } else {
                    this.expandedNodes.add(node.id);
                }
                this.renderTree();
            }
            this.showContent(node.id);
        });

        container.appendChild(header);

        if (hasChildren) {
            const childContainer = document.createElement('div');
            childContainer.className = `tree-node-children ${isExpanded ? 'expanded' : ''}`;
            node.children.forEach(child => {
                childContainer.appendChild(this.createTreeNode(child, depth + 1));
            });
            container.appendChild(childContainer);
        }

        if (this.activeNodeId === node.id) {
            header.classList.add('active');
        }

        return container;
    }

    countAllChildren(node) {
        if (!node.children) return 0;
        let count = node.children.length;
        node.children.forEach(c => count += this.countAllChildren(c));
        return count;
    }

    showContent(nodeId) {
        this.activeNodeId = nodeId;
        const nodeData = this.nodeMap.get(nodeId);
        if (!nodeData || !nodeData.content) return;

        this.updateBreadcrumb(nodeData.path);
        this.renderContent(nodeData);
        this.renderTree(); // re-render to update active state
    }

    updateBreadcrumb(path) {
        this.breadcrumb.innerHTML = '';
        path.forEach((item, idx) => {
            if (idx > 0) {
                const sep = document.createElement('span');
                sep.className = 'breadcrumb-separator';
                sep.textContent = '›';
                this.breadcrumb.appendChild(sep);
            }
            if (idx < path.length - 1) {
                const link = document.createElement('span');
                link.className = 'breadcrumb-item';
                link.textContent = item.label;
                link.addEventListener('click', () => this.showContent(item.id));
                this.breadcrumb.appendChild(link);
            } else {
                const current = document.createElement('span');
                current.className = 'breadcrumb-current';
                current.textContent = item.label;
                this.breadcrumb.appendChild(current);
            }
        });
    }

    renderContent(nodeData) {
        const content = nodeData.content;
        let html = '';

        // Title
        html += `<div class="content-card"><h2>${content.title}</h2>`;

        // If landing page (root)
        if (content.type === 'landing') {
            content.sections.forEach(s => {
                html += this.renderSection(s);
            });

            // Landing cards for children
            if (nodeData.children && nodeData.children.length > 0) {
                html += '<div class="landing-grid">';
                nodeData.children.forEach(child => {
                    const childColor = child.color || 'blue';
                    const childCount = this.countAllChildren(child);
                    html += `
                        <div class="landing-card ${childColor}" onclick="app.expandAndShow('${child.id}')">
                            <div class="card-icon">${child.icon}</div>
                            <div class="card-title">${child.label}</div>
                            <div class="card-desc">${child.content?.sections?.[0]?.text?.substring(0, 150) || ''}...</div>
                            <div class="card-count">${childCount} subtopics</div>
                        </div>
                    `;
                });
                html += '</div>';
            }
            html += '</div>';
        } else {
            // Regular content
            content.sections.forEach(s => {
                html += this.renderSection(s);
            });
            html += '</div>';
        }

        // Show children as cards at bottom
        if (nodeData.children && nodeData.children.length > 0 && content.type !== 'landing') {
            html += `<div class="content-card"><h3>📂 Subtopics</h3><div class="landing-grid">`;
            nodeData.children.forEach(child => {
                html += `
                    <div class="landing-card ${child.color || 'blue'}" onclick="app.expandAndShow('${child.id}')">
                        <div class="card-icon">${child.icon}</div>
                        <div class="card-title">${child.label}</div>
                    </div>
                `;
            });
            html += '</div></div>';
        }

        this.contentPanel.innerHTML = html;
        this.contentPanel.scrollTop = 0;
    }

    renderSection(section) {
        let html = '';
        switch (section.type) {
            case 'definition':
                html += `<div class="info-box definition">
                    <div class="info-title">📘 ${section.title}</div>
                    <p>${section.text}</p>
                </div>`;
                break;

            case 'paragraph':
                html += `<p>${section.text}</p>`;
                break;

            case 'questions':
                html += `<div class="info-box question">
                    <div class="info-title">❓ ${section.title}</div>
                    <ul>${section.items.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>`;
                break;

            case 'tags':
                html += `<h3>🏷️ Tools, Algorithms, Formats & Databases</h3><div class="tags">`;
                section.items.forEach(tag => {
                    html += `<span class="tag ${tag.class}">${tag.label}</span>`;
                });
                html += '</div>';
                break;

            case 'tools-table':
                html += `<h3>🛠️ ${section.title}</h3>`;
                html += '<table class="comparison-table"><thead><tr>';
                section.headers.forEach(h => html += `<th>${h}</th>`);
                html += '</tr></thead><tbody>';
                section.rows.forEach(row => {
                    html += '<tr>';
                    row.forEach(cell => html += `<td>${cell}</td>`);
                    html += '</tr>';
                });
                html += '</tbody></table>';
                break;

            case 'pipeline':
                html += `<h3>⚡ Analysis Pipeline</h3><div class="pipeline">`;
                section.steps.forEach((step, idx) => {
                    if (idx > 0) html += '<span class="pipeline-arrow">→</span>';
                    html += `<div class="pipeline-step">
                        <div class="step-name">${step.name}</div>
                        <div class="step-tool">${step.tool}</div>
                    </div>`;
                });
                html += '</div>';
                break;

            case 'code':
                const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                html += `<h3>💻 ${section.title || 'Code'}</h3>`;
                html += `<div class="code-block" id="${codeId}">
                    <span class="code-lang">${section.lang}</span>
                    <button class="copy-btn" onclick="app.copyCode('${codeId}')">Copy</button>
                    <pre>${this.escapeHtml(section.code)}</pre>
                </div>`;
                break;

            case 'math':
                html += `<div class="info-box math">
                    <div class="info-title">📐 ${section.title}</div>`;
                section.formulas.forEach(f => {
                    html += `<h4>${f.name}</h4><p>${f.desc}</p>`;
                    if (f.formula) {
                        html += `<div class="formula">${f.formula}</div>`;
                    }
                });
                html += '</div>';
                break;

            case 'interpretation':
                html += `<div class="interpretation">
                    <h4>🔍 ${section.title}</h4>
                    <ul>${section.items.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>`;
                break;
        }
        return html;
    }

    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    copyCode(blockId) {
        const block = document.getElementById(blockId);
        const code = block.querySelector('pre').textContent;
        navigator.clipboard.writeText(code).then(() => {
            const btn = block.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        });
    }

    expandAndShow(nodeId) {
        // Expand all ancestors
        const nodeData = this.nodeMap.get(nodeId);
        if (nodeData && nodeData.path) {
            nodeData.path.forEach(p => this.expandedNodes.add(p.id));
        }
        this.showContent(nodeId);
    }

    setupSearch() {
        this.searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 2) {
                this.renderTree();
                return;
            }
            this.searchAndHighlight(query);
        });
    }

    searchAndHighlight(query) {
        const results = [];
        this.nodeMap.forEach((node, id) => {
            const searchableText = [
                node.label,
                ...(node.content?.sections || []).map(s => {
                    return [s.text, s.title, ...(s.items || []),
                            ...(s.rows || []).flat(),
                            ...(s.formulas || []).map(f => f.name + ' ' + f.desc),
                            s.code || ''].join(' ');
                })
            ].join(' ').toLowerCase();

            if (searchableText.includes(query)) {
                results.push(node);
            }
        });

        // Show results in content panel
        let html = `<div class="content-card"><h2>🔍 Search Results for "${query}"</h2>`;
        html += `<p class="text-muted">${results.length} results found</p>`;
        html += '<div class="landing-grid">';
        results.forEach(node => {
            html += `
                <div class="landing-card ${node.color || 'blue'}" onclick="app.expandAndShow('${node.id}')">
                    <div class="card-icon">${node.icon}</div>
                    <div class="card-title">${node.label}</div>
                    <div class="card-desc">${node.path?.map(p => p.label).join(' › ')}</div>
                </div>
            `;
        });
        html += '</div></div>';
        this.contentPanel.innerHTML = html;
    }
}

// Initialize the app
const app = new BioinformaticsApp();
</script>
